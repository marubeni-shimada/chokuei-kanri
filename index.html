<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>直営現場管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#F0F0F0;color:#111;}
.header{background:#111;padding:16px 16px 14px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-title-block{display:flex;flex-direction:column;}
.header h1{font-size:18px;font-weight:600;color:#fff;letter-spacing:-0.3px;}
.header-sub{font-size:12px;color:#888;margin-top:2px;}
.header-actions{display:flex;align-items:center;gap:8px;}
.gear-btn{background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;opacity:0.85;}
.gear-btn:hover{opacity:1;}
.reg-btn{background:#06C755;color:#fff;border:none;border-radius:20px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;}
/* マスタ管理ページ */
.master-header{background:#111;padding:16px 16px 14px;display:flex;align-items:center;gap:12px;}
.master-header .back{color:#fff;font-size:14px;cursor:pointer;opacity:0.9;}
.master-header h1{color:#fff;font-size:18px;font-weight:600;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #E0E0E0;}
.tab{flex:1;padding:14px;font-size:14px;font-weight:600;color:#888;text-align:center;cursor:pointer;border-bottom:3px solid transparent;background:#fff;border-left:none;border-right:none;border-top:none;}
.tab.active{color:#111;border-bottom-color:#06C755;}
.master-list{padding:12px;background:#F0F0F0;min-height:300px;}
.master-add-btn{width:100%;padding:12px;background:#fff;border:2px dashed #BBB;border-radius:12px;font-size:14px;font-weight:600;color:#666;cursor:pointer;margin-bottom:10px;}
.master-item{background:#fff;border:1px solid #DDD;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.master-item-info{flex:1;min-width:0;}
.master-item-name{font-size:16px;font-weight:600;color:#111;}
.master-item-sub{font-size:12px;color:#888;margin-top:2px;}
.master-item-btns{display:flex;gap:6px;flex-shrink:0;}
.master-edit{font-size:12px;color:#666;background:#F5F5F5;border:none;border-radius:7px;padding:6px 11px;font-weight:600;cursor:pointer;}
.master-del{font-size:12px;color:#E03B3B;background:#FEEEEE;border:none;border-radius:7px;padding:6px 11px;font-weight:600;cursor:pointer;}
.master-empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;}
/* ログインモーダル */
.login-modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto;}
.login-modal{background:#fff;border-radius:16px;margin:80px 24px 24px;padding:24px 20px;}
.login-modal h2{font-size:18px;font-weight:700;color:#111;text-align:center;margin-bottom:6px;}
.login-modal .sub{font-size:13px;color:#888;text-align:center;margin-bottom:18px;}
.login-modal input{width:100%;padding:13px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;background:#fff;color:#111;}
.login-modal .err{font-size:13px;color:#E03B3B;margin-top:8px;min-height:18px;}
.login-modal .btns{display:flex;gap:8px;margin-top:14px;}
.login-modal .btns button{flex:1;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;}
.login-cancel{background:#f5f5f5;color:#555;}
.login-ok{background:#06C755;color:#fff;}
.search-wrap{background:#fff;padding:10px 12px;border-left:0.5px solid #E0E0E0;border-right:0.5px solid #E0E0E0;}
.search-wrap input{width:100%;padding:9px 12px;border:none;border-radius:10px;font-size:14px;background:#F5F5F5;color:#111;}
.search-wrap input:focus{outline:none;}
.count{font-size:13px;color:#888;padding:8px 14px 4px;background:#fff;border-left:0.5px solid #E0E0E0;border-right:0.5px solid #E0E0E0;}
.list{padding:0 10px 10px;background:#fff;border-left:0.5px solid #E0E0E0;border-right:0.5px solid #E0E0E0;border-bottom:0.5px solid #E0E0E0;border-radius:0 0 14px 14px;}
.card{background:#fff;border:2px solid #AAAAAA;border-radius:14px;padding:14px;margin-bottom:8px;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-name-row{display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.name{font-size:18px;font-weight:600;color:#111;letter-spacing:-0.3px;}
.kantoku-tag{display:inline-block;font-size:12px;font-weight:600;border-radius:8px;padding:3px 10px;}
.kantoku-tag.has{background:#E6F1FB;color:#0C447C;}
.kantoku-tag.none{background:#EEEEEE;color:#888;}
.slot-box{border-radius:10px;padding:10px 12px;margin-top:6px;background:#F8F8F8;}
.slot-box.next{background:#FAFAFA;border:1px dashed #DDD;}
.slot-box.upcoming{background:#FFF8E8;border:1px dashed #D4B26A;}
.slot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.slot-badge{font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px;letter-spacing:0.5px;}
.slot-badge.now{color:#06A047;background:#E1F5EE;}
.slot-badge.next{color:#888;background:#EEE;}
.slot-badge.upcoming{color:#866216;background:#F4E2A8;}
.slot-edit{font-size:11px;color:#666;background:#fff;border:1px solid #DDD;border-radius:6px;padding:3px 9px;font-weight:600;cursor:pointer;}
.add-genba-btn{font-size:12px;color:#06A047;background:#E1F5EE;border:none;border-radius:8px;padding:6px 12px;font-weight:600;cursor:pointer;flex-shrink:0;}
.slot-genba{font-size:14px;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.slot-koki{font-size:13px;color:#555;}
.slot-box.next .slot-genba{font-size:13px;color:#555;}
.slot-box.next .slot-koki{font-size:12px;color:#999;}
.empty{text-align:center;padding:60px 20px;color:#bbb;font-size:15px;}
.loading{text-align:center;padding:40px;color:#bbb;font-size:14px;}
/* モーダル */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:100;overflow-y:auto;}
.modal{background:#fff;border-radius:16px;margin:60px 16px;padding:20px;}
.modal h2{font-size:16px;font-weight:600;color:#111;margin-bottom:16px;}
.modal label{font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:4px;margin-top:12px;}
.modal select,.modal input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;background:#fff;color:#111;}
.modal-row{display:flex;gap:8px;}
.modal-row .mgroup{flex:1;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;}
.cancel-btn{background:#f5f5f5;color:#555;}
.save-btn{background:#06C755;color:#fff;}
.kantoku-disp{font-size:13px;color:#0C447C;background:#E6F1FB;border-radius:8px;padding:8px 12px;margin-top:4px;min-height:36px;}
.date-group{margin-top:12px;}
.koki-preview{background:#E8F5E9;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.koki-preview-label{font-size:11px;font-weight:700;color:#2E7D32;letter-spacing:0.5px;}
.koki-preview-days{font-size:14px;font-weight:700;color:#2E7D32;}
.koki-preview.invalid{background:#FDECEC;}
.koki-preview.invalid .koki-preview-label,.koki-preview.invalid .koki-preview-days{color:#C62828;}
.del-from-modal-btn{width:100%;margin-top:10px;padding:10px;background:#fff;color:#E03B3B;border:1px solid #E03B3B;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
/* 登録フォーム */
.page{display:none;}
.page.active{display:block;}
.reg-header{background:#06C755;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.back{color:#fff;font-size:14px;cursor:pointer;opacity:0.9;}
.reg-header h1{color:#fff;font-size:17px;font-weight:600;}
.form{padding:20px 16px 30px;}
.group{margin-bottom:16px;}
label{font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:5px;}
select,input[type=date]{width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;background:#fff;color:#111;}
.kantoku-disp-reg{font-size:14px;color:#0C447C;background:#E6F1FB;border-radius:10px;padding:10px 12px;min-height:42px;display:flex;align-items:center;}
.genba-input{width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;background:#fff;color:#111;margin-top:8px;display:none;}
.row{display:flex;gap:10px;}
.row .group{flex:1;}
.btn{width:100%;padding:14px;background:#06C755;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn:disabled{background:#ccc;}
.success{display:none;text-align:center;padding:40px 20px;}
.check{width:56px;height:56px;background:#E8F5E9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;color:#2E7D32;}
.s-title{font-size:17px;font-weight:600;color:#111;margin-bottom:8px;}
.s-sub{font-size:14px;color:#777;line-height:1.7;}
.back-btn{margin-top:20px;width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:12px;font-size:15px;color:#555;cursor:pointer;}
/* オーバーレイ */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.overlay.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#06C755;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay-msg{font-size:14px;color:#555;}
/* 削除確認 */
.del-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:299;}
.del-overlay.show{display:block;}
.del-modal{display:none;position:fixed;bottom:0;left:0;width:100%;z-index:300;padding:16px;}
.del-modal.show{display:block;}
.del-inner{background:#fff;border-radius:16px;padding:20px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.15);}
.del-title{font-size:16px;font-weight:600;color:#111;margin-bottom:6px;}
.del-sub{font-size:13px;color:#888;margin-bottom:16px;}
.del-btns{display:flex;gap:8px;}
.del-btns button{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;}
.del-cancel{background:#f5f5f5;color:#555;}
.del-confirm{background:#FF3B30;color:#fff;}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-msg" id="overlay-msg">読み込み中...</div>
</div>

<!-- ===== 一覧ページ ===== -->
<div class="page active" id="page-list">
  <div class="header">
    <div class="header-left">
      <div class="header-title-block">
        <h1>直営現場一覧</h1>
        <div class="header-sub" id="header-sub"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="gear-btn" onclick="showMaster()" title="マスタ管理" aria-label="マスタ管理">⚙</button>
      <button class="reg-btn" onclick="showRegister()">＋ 登録</button>
    </div>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="名前・現場・監督で検索" oninput="render()">
  </div>
  <div class="count" id="count"></div>
  <div class="list" id="list"><div class="loading">読み込み中...</div></div>
</div>

<!-- ===== 登録ページ ===== -->
<div class="page" id="page-register">
  <div class="reg-header">
    <span class="back" onclick="showList()">← 一覧</span>
    <h1>現場登録</h1>
  </div>
  <div class="form" id="reg-form">
    <div class="group">
      <label>作業員名</label>
      <select id="sel-worker"><option value="">選択してください</option></select>
    </div>
    <div class="group">
      <label>現場名</label>
      <select id="sel-genba" onchange="onRegGenbaChange()"><option value="">選択してください</option></select>
      <input type="text" class="genba-input" id="inp-genba-free" placeholder="現場名を入力してください">
    </div>
    <div class="group" id="reg-kantoku-group">
      <label>監督名</label>
      <div class="kantoku-disp-reg" id="reg-kantoku-disp">現場を選ぶと自動表示されます</div>
      <input type="hidden" id="reg-kantoku">
    </div>
    <div class="group">
      <label>開始日</label>
      <input type="date" id="inp-start" onchange="updateRegKoki()">
    </div>
    <div class="group">
      <label>終了予定日</label>
      <input type="date" id="inp-end" onchange="updateRegKoki()">
    </div>
    <div class="koki-preview" id="reg-koki-preview" style="display:none;margin-bottom:10px;">
      <span class="koki-preview-label">期間</span>
      <span class="koki-preview-days" id="reg-koki-days">—</span>
    </div>
    <button class="btn" id="reg-btn-submit" onclick="submitRegister()">登録する</button>
  </div>
  <div class="success" id="reg-success">
    <div class="check">✓</div>
    <div class="s-title">登録しました</div>
    <div class="s-sub" id="reg-success-msg"></div>
    <button class="back-btn" onclick="resetRegister()">続けて登録する</button>
    <button class="back-btn" style="margin-top:8px;" onclick="showList()">一覧に戻る</button>
  </div>
</div>

<!-- ===== マスタ管理ページ ===== -->
<div class="page" id="page-master">
  <div class="master-header">
    <span class="back" onclick="showList()">← 一覧</span>
    <h1>マスタ管理</h1>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-genba" onclick="switchTab('genba')">現場</button>
    <button class="tab" id="tab-kantoku" onclick="switchTab('kantoku')">監督</button>
    <button class="tab" id="tab-worker" onclick="switchTab('worker')">作業員</button>
  </div>
  <div class="master-list" id="master-list"></div>
</div>

<!-- ===== ログインモーダル ===== -->
<div class="login-modal-bg" id="login-modal-bg">
  <div class="login-modal">
    <h2>🔒 マスタ管理</h2>
    <div class="sub">パスワードを入力してください</div>
    <input type="password" id="login-password" placeholder="パスワード" autocomplete="off">
    <div class="err" id="login-err"></div>
    <div class="btns">
      <button class="login-cancel" onclick="closeLoginModal()">キャンセル</button>
      <button class="login-ok" onclick="submitLogin()">ログイン</button>
    </div>
  </div>
</div>

<!-- ===== マスタ編集モーダル（現場） ===== -->
<div class="modal-bg" id="genba-modal-bg">
  <div class="modal">
    <h2 id="genba-modal-title">現場を追加</h2>
    <input type="hidden" id="genba-edit-row">
    <label>現場名</label>
    <input type="text" id="genba-input-name" placeholder="例：渋谷区神南ビル新築工事">
    <label>監督名</label>
    <select id="genba-input-kantoku-select" onchange="onGenbaKantokuChange()"></select>
    <input type="text" id="genba-input-kantoku-free" placeholder="監督名を入力" style="display:none;margin-top:8px;">
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeGenbaModal()">キャンセル</button>
      <button class="save-btn" onclick="saveGenba()">保存</button>
    </div>
  </div>
</div>

<!-- ===== マスタ編集モーダル（作業員） ===== -->
<div class="modal-bg" id="worker-modal-bg">
  <div class="modal">
    <h2 id="worker-modal-title">作業員を追加</h2>
    <input type="hidden" id="worker-edit-row">
    <label>作業員名</label>
    <input type="text" id="worker-input-name" placeholder="例：田中 浩二">
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeWorkerModal()">キャンセル</button>
      <button class="save-btn" onclick="saveWorker()">保存</button>
    </div>
  </div>
</div>

<!-- ===== 作業員に現場を追加するモーダル ===== -->
<div class="modal-bg" id="add-genba-modal-bg">
  <div class="modal">
    <div style="font-size:12px;color:#888;margin-bottom:4px;" id="add-genba-modal-subtitle"></div>
    <h2 style="margin-bottom:14px;">現場を追加</h2>
    <input type="hidden" id="add-genba-target-name">
    <label>現場名</label>
    <select id="add-genba-input-select" onchange="onAddGenbaChange()"><option value="">選択してください</option></select>
    <input type="text" class="genba-input" id="add-genba-input-free" placeholder="現場名を入力してください">
    <div id="add-genba-kantoku-group">
      <label>監督名</label>
      <div class="kantoku-disp" id="add-genba-kantoku-disp">現場を選ぶと自動表示されます</div>
      <input type="hidden" id="add-genba-kantoku">
    </div>
    <div class="date-group">
      <label>開始日</label>
      <input type="date" id="add-genba-start" onchange="updateAddGenbaKoki()">
    </div>
    <div class="date-group">
      <label>終了予定日</label>
      <input type="date" id="add-genba-end" onchange="updateAddGenbaKoki()">
    </div>
    <div class="koki-preview" id="add-genba-koki-preview" style="display:none;">
      <span class="koki-preview-label">期間</span>
      <span class="koki-preview-days" id="add-genba-koki-days">—</span>
    </div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeAddGenbaModal()">キャンセル</button>
      <button class="save-btn" onclick="saveAddGenba()">追加する</button>
    </div>
  </div>
</div>

<!-- ===== 編集モーダル ===== -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div id="edit-slot-badge-wrap" style="margin-bottom:6px;display:none;">
      <span class="slot-badge" id="edit-slot-badge">今</span>
    </div>
    <h2>現場を編集</h2>
    <input type="hidden" id="edit-row">
    <label>作業員名</label>
    <select id="edit-worker"></select>
    <label>現場名</label>
    <select id="edit-genba" onchange="onEditGenbaChange()"></select>
    <input type="text" class="genba-input" id="edit-genba-free" placeholder="現場名を入力してください">
    <div id="edit-kantoku-group">
      <label>監督名</label>
      <div class="kantoku-disp" id="edit-kantoku-disp">—</div>
    </div>
    <input type="hidden" id="edit-kantoku">
    <div class="date-group">
      <label>開始日</label>
      <input type="date" id="edit-start" onchange="updateEditKoki()">
    </div>
    <div class="date-group">
      <label>終了予定日</label>
      <input type="date" id="edit-end" onchange="updateEditKoki()">
    </div>
    <div class="koki-preview" id="edit-koki-preview" style="display:none;">
      <span class="koki-preview-label">期間</span>
      <span class="koki-preview-days" id="edit-koki-days">—</span>
    </div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
      <button class="save-btn" onclick="saveEdit()">保存</button>
    </div>
    <button class="del-from-modal-btn" onclick="delFromEdit()">🗑 この現場を削除</button>
  </div>
</div>

<!-- ===== 削除確認 ===== -->
<div class="del-overlay" id="del-overlay" onclick="closeDelModal()"></div>
<div class="del-modal" id="del-modal">
  <div class="del-inner">
    <div class="del-title">削除しますか？</div>
    <div class="del-sub">この操作は元に戻せません</div>
    <div class="del-btns">
      <button class="del-cancel" onclick="closeDelModal()">キャンセル</button>
      <button class="del-confirm" onclick="confirmDel()">削除する</button>
    </div>
  </div>
</div>

<script>
// ======================================
// ★ここにGASのURLを貼り付けてください★
const API_URL = "https://script.google.com/macros/s/AKfycbwApTDfD_mVGzcP0lr0V_7q_s73JQj2-uXzmtXq1avLzZ1477JNjed2AiA3U1tvYQff/exec";
// 例: const API_URL = "https://script.google.com/macros/s/XXXXXXXX/exec";
// ======================================

const COLORS = [
  {bg:'#E6F1FB',color:'#0C447C'},{bg:'#E1F5EE',color:'#0F6E56'},
  {bg:'#FAECE7',color:'#993C1D'},{bg:'#EEEDFE',color:'#3C3489'},
  {bg:'#E0F2F1',color:'#00695C'},{bg:'#FBEAF0',color:'#72243E'}
];

let allData = [], masters = { workers: [], genbas: [], kantokus: [] }, delTarget = null;
let masterAuthed = false;
let masterPassword = '';

// ── ユーティリティ ──
function showOverlay(msg) {
  document.getElementById('overlay-msg').textContent = msg || '処理中...';
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}
function initials(n) { return n.replace(/\s/g, '').slice(0, 2); }
function fmt(d) { if (!d) return ''; const p = d.split('-'); return p[1] + '/' + p[2]; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hasKantoku(k) {
  const v = (k || '').trim();
  return v !== '' && v !== 'なし';
}
// 今日の日付（YYYY-MM-DD）
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function renderKokiPreview(startVal, endVal, previewEl, daysEl) {
  if (!startVal || !endVal) { previewEl.style.display = 'none'; return; }
  const s = new Date(startVal), e = new Date(endVal);
  if (isNaN(s) || isNaN(e)) { previewEl.style.display = 'none'; return; }
  const diff = Math.round((e - s) / 86400000) + 1;
  previewEl.style.display = 'flex';
  if (diff <= 0) {
    previewEl.classList.add('invalid');
    daysEl.textContent = '終了日が開始日より前です';
  } else {
    previewEl.classList.remove('invalid');
    daysEl.textContent = diff + '日間';
  }
}
function updateEditKoki() {
  renderKokiPreview(
    document.getElementById('edit-start').value,
    document.getElementById('edit-end').value,
    document.getElementById('edit-koki-preview'),
    document.getElementById('edit-koki-days')
  );
}
function updateRegKoki() {
  renderKokiPreview(
    document.getElementById('inp-start').value,
    document.getElementById('inp-end').value,
    document.getElementById('reg-koki-preview'),
    document.getElementById('reg-koki-days')
  );
}

async function loadList() {
  showOverlay('読み込み中...');
  try {
    const result = await apiGet('list');
    const m = result.masters || {};
    masters = {
      workers: Array.isArray(m.workersFull) ? m.workersFull
              : Array.isArray(m.workers) ? m.workers.map(w => typeof w === 'string' ? { name: w } : w)
              : [],
      genbas: Array.isArray(m.genbasFull) ? m.genbasFull
             : Array.isArray(m.genbas) ? m.genbas.map(g => typeof g === 'string' ? { name: g, kantoku: '' } : g)
             : [],
      kantokus: Array.isArray(m.kantokus) ? m.kantokus : []
    };
    allData = result.records || [];
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty">読み込みに失敗しました</div>';
  }
  hideOverlay();
}

// allData から作業員ごとに「今」「次」「開始前」を抽出してグループ化
function buildWorkerGroups() {
  const today = todayStr();
  // 終了予定日が今日以降のものだけ残す
  const active = allData.filter(d => d.end && d.end >= today);
  const groups = new Map();
  active.forEach(d => {
    if (!groups.has(d.name)) groups.set(d.name, []);
    groups.get(d.name).push(d);
  });
  const result = [];
  for (const [name, records] of groups.entries()) {
    records.sort((a, b) => (a.start || '').localeCompare(b.start || ''));
    const now = records.find(r => r.start && r.start <= today && r.end >= today);
    const future = records.filter(r => r.start && r.start > today);
    let next = null, upcoming = null;
    if (now) {
      next = future[0] || null;
    } else if (future.length > 0) {
      upcoming = future[0]; // 「今」が無く、未来の予定だけある
    }
    if (!now && !upcoming) continue;
    result.push({ name, now, next, upcoming });
  }
  return result;
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const groups = buildWorkerGroups();
  const filtered = groups.filter(g => {
    if (!q) return true;
    const slots = [g.now, g.next, g.upcoming].filter(Boolean);
    return g.name.toLowerCase().includes(q) ||
           slots.some(s =>
             (s.genba || '').toLowerCase().includes(q) ||
             (s.kantoku || '').toLowerCase().includes(q)
           );
  });
  const sub = document.getElementById('header-sub');
  if (sub) sub.textContent = groups.length + '名 稼働中';
  document.getElementById('count').textContent = filtered.length + '名';
  if (!filtered.length) { document.getElementById('list').innerHTML = '<div class="empty">該当なし</div>'; return; }

  document.getElementById('list').innerHTML = filtered.map((g, i) => {
    const c = COLORS[i % COLORS.length];
    let slotsHtml = '';

    if (g.now) {
      const kt = hasKantoku(g.now.kantoku)
        ? `<span class="kantoku-tag has">監督 ${esc(g.now.kantoku)}</span>`
        : `<span class="kantoku-tag none">監督 なし</span>`;
      slotsHtml += `<div class="slot-box">
        <div class="slot-header">
          <span class="slot-badge now">今</span>
          <button class="slot-edit" onclick="openEdit(${g.now.rowIndex})">編集</button>
        </div>
        <div class="slot-genba">${esc(g.now.genba)}</div>
        <div class="slot-meta">
          <span class="slot-koki">${fmt(g.now.start)} 〜 ${fmt(g.now.end)}</span>
          ${kt}
        </div>
      </div>`;
      if (g.next) {
        slotsHtml += `<div class="slot-box next">
          <div class="slot-header">
            <span class="slot-badge next">次</span>
            <button class="slot-edit" onclick="openEdit(${g.next.rowIndex})">編集</button>
          </div>
          <div class="slot-genba">${esc(g.next.genba)}</div>
          <div class="slot-meta">
            <span class="slot-koki">${fmt(g.next.start)}〜${fmt(g.next.end)}</span>
          </div>
        </div>`;
      }
    } else if (g.upcoming) {
      const kt = hasKantoku(g.upcoming.kantoku)
        ? `<span class="kantoku-tag has">監督 ${esc(g.upcoming.kantoku)}</span>`
        : `<span class="kantoku-tag none">監督 なし</span>`;
      slotsHtml += `<div class="slot-box upcoming">
        <div class="slot-header">
          <span class="slot-badge upcoming">開始前</span>
          <button class="slot-edit" onclick="openEdit(${g.upcoming.rowIndex})">編集</button>
        </div>
        <div class="slot-genba">${esc(g.upcoming.genba)}</div>
        <div class="slot-meta">
          <span class="slot-koki">${fmt(g.upcoming.start)} 〜 ${fmt(g.upcoming.end)}</span>
          ${kt}
        </div>
      </div>`;
    }

    return `<div class="card">
      <div class="card-top">
        <div class="card-name-row">
          <div class="avatar" style="background:${c.bg};color:${c.color}">${esc(initials(g.name))}</div>
          <div class="name">${esc(g.name)}</div>
        </div>
        <button class="add-genba-btn" onclick="openAddGenbaModal('${esc(g.name).replace(/'/g, "\\'")}')">＋ 現場を追加</button>
      </div>
      ${slotsHtml}
    </div>`;
  }).join('');
}

function onEditGenbaChange() {
  const val = document.getElementById('edit-genba').value;
  const freeInput = document.getElementById('edit-genba-free');
  const kantokuGroup = document.getElementById('edit-kantoku-group');
  if (val === '__free__') {
    freeInput.style.display = 'block';
    kantokuGroup.style.display = 'none';
    document.getElementById('edit-kantoku').value = 'なし';
  } else {
    freeInput.style.display = 'none';
    kantokuGroup.style.display = 'block';
    const found = masters.genbas.find(g => g.name === val);
    const k = found ? found.kantoku : '';
    document.getElementById('edit-kantoku').value = k;
    document.getElementById('edit-kantoku-disp').textContent = k || '—';
  }
}
function openEdit(idx) {
  const d = allData.find(r => r.rowIndex === idx);
  if (!d) return;
  document.getElementById('edit-row').value = idx;

  // 「今」「次」バッジを設定
  const today = todayStr();
  const badgeWrap = document.getElementById('edit-slot-badge-wrap');
  const badge = document.getElementById('edit-slot-badge');
  let badgeType = null;
  if (d.start && d.end) {
    if (d.start <= today && d.end >= today) badgeType = 'now';
    else if (d.start > today) badgeType = 'next';
  }
  if (badgeType === 'now') {
    badge.className = 'slot-badge now';
    badge.textContent = '今';
    badgeWrap.style.display = 'block';
  } else if (badgeType === 'next') {
    badge.className = 'slot-badge next';
    badge.textContent = '次';
    badgeWrap.style.display = 'block';
  } else {
    badgeWrap.style.display = 'none';
  }

  const ws = document.getElementById('edit-worker');
  const gs = document.getElementById('edit-genba');
  ws.innerHTML = ''; gs.innerHTML = '';
  masters.workers.forEach(w => { const o = document.createElement('option'); o.textContent = w.name; if (w.name === d.name) o.selected = true; ws.appendChild(o); });
  // マスタにない現場名なら、現在の値をプルダウン先頭に追加
  const inMaster = masters.genbas.some(g => g.name === d.genba);
  if (!inMaster && d.genba) {
    const cur = document.createElement('option');
    cur.value = d.genba; cur.textContent = d.genba;
    cur.selected = true;
    gs.appendChild(cur);
  }
  masters.genbas.forEach(g => { const o = document.createElement('option'); o.value = g.name; o.textContent = g.name; if (g.name === d.genba) o.selected = true; gs.appendChild(o); });
  const free = document.createElement('option'); free.value = '__free__'; free.textContent = '✏️ 直接入力する'; gs.appendChild(free);
  document.getElementById('edit-genba-free').style.display = 'none';
  document.getElementById('edit-kantoku-group').style.display = 'block';
  document.getElementById('edit-start').value = d.start;
  document.getElementById('edit-end').value = d.end;
  onEditGenbaChange();
  updateEditKoki();
  document.getElementById('modal-bg').style.display = 'block';
}
function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }
async function saveEdit() {
  const idx = parseInt(document.getElementById('edit-row').value);
  const name = document.getElementById('edit-worker').value;
  const selGenba = document.getElementById('edit-genba').value;
  const genba = selGenba === '__free__' ? document.getElementById('edit-genba-free').value.trim() : selGenba;
  const kantoku = selGenba === '__free__' ? 'なし' : document.getElementById('edit-kantoku').value;
  const start = document.getElementById('edit-start').value;
  const end = document.getElementById('edit-end').value;
  if (!start || !end) { alert('日付を入力してください'); return; }
  closeModal();
  showOverlay('保存中...');
  await apiPost({ action: 'update', rowIndex: idx, name, genba, kantoku, start, end });
  const d = allData.find(r => r.rowIndex === idx);
  if (d) { d.name = name; d.genba = genba; d.kantoku = kantoku; d.start = start; d.end = end; }
  hideOverlay();
  render();
}

function openLoginModal() {
  document.getElementById('login-password').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-modal-bg').style.display = 'block';
  setTimeout(() => document.getElementById('login-password').focus(), 100);

function closeLoginModal() {

async function submitLogin() {
  const pw = document.getElementById('login-password').value;
  if (!pw) {
    document.getElementById('login-err').textContent = 'パスワードを入力してください';
    return;
  }
  document.getElementById('login-err').textContent = '';
  showOverlay('認証中...');
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', password: pw }),
      redirect: 'follow'
    });
    const result = await res.json();
    hideOverlay();
    if (result && result.success) {
      masterAuthed = true;
      masterPassword = pw;
      closeLoginModal();
      hideAllPages();
      document.getElementById('page-master').classList.add('active');
      loadMasters();
    } else {
      document.getElementById('login-err').textContent = (result && result.error) || 'パスワードが違います';

  } catch (e) {
    hideOverlay();
    document.getElementById('login-err').textContent = '通信エラーが発生しました';
  }
}

// 現場マスタの監督名を重複排除して取得（読み取り専用ビュー用）
function getKantokuListFromGenbas() {
  const map = new Map();
  (masters.genbas || []).forEach(g => {
    const k = (g.kantoku || '').trim();
    if (k && k !== 'なし') {
      map.set(k, (map.get(k) || 0) + 1);
    }
  });
  return Array.from(map.entries())
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => a.name.localeCompare(b.name, 'ja'));
}

function renderMasterList() {
  const container = document.getElementById('master-list');
  if (currentTab === 'genba') {
    const items = masters.genbas || [];
    let html = `<button class="master-add-btn" onclick="openGenbaModal()">＋ 現場を追加</button>`;
    if (!items.length) {
      html += '<div class="master-empty">現場が登録されていません</div>';
    } else {
      html += items.map(g => `
        <div class="master-item">
          <div class="master-item-info">
            <div class="master-item-name">${esc(g.name)}</div>
            <div class="master-item-sub">監督: ${esc(g.kantoku) || 'なし'}</div>
          </div>
          <div class="master-item-btns">
            <button class="master-edit" onclick="openGenbaModal(${g.rowIndex})">編集</button>
            <button class="master-del" onclick="deleteGenba(${g.rowIndex}, '${esc(g.name).replace(/'/g, "\\'")}')">削除</button>
          </div>
        </div>
      `).join('');
    }
    container.innerHTML = html;
  } else if (currentTab === 'kantoku') {
    const items = getKantokuListFromGenbas();
    let html = `<div class="master-empty" style="padding:14px 16px;text-align:left;font-size:12px;color:#666;background:#fff;border:1px solid #DDD;border-radius:10px;margin-bottom:10px;">監督名は「現場」タブで現場ごとに設定します。<br>ここでは現場マスタに登録されている監督が自動表示されます。</div>`;
    if (!items.length) {
      html += '<div class="master-empty">監督が登録されていません</div>';
    } else {
      html += items.map(k => `
        <div class="master-item">
          <div class="master-item-info">
            <div class="master-item-name">${esc(k.name)}</div>
            <div class="master-item-sub">担当現場: ${k.count}件</div>
          </div>
        </div>
      `).join('');
    }
    container.innerHTML = html;
  } else {
    const items = masters.workers || [];
    let html = `<button class="master-add-btn" onclick="openWorkerModal()">＋ 作業員を追加</button>`;
    if (!items.length) {
      html += '<div class="master-empty">作業員が登録されていません</div>';
    } else {
      html += items.map(w => `
        <div class="master-item">
          <div class="master-item-info">
            <div class="master-item-name">${esc(w.name)}</div>
          </div>
          <div class="master-item-btns">
            <button class="master-edit" onclick="openWorkerModal(${w.rowIndex})">編集</button>
            <button class="master-del" onclick="deleteWorker(${w.rowIndex}, '${esc(w.name).replace(/'/g, "\\'")}')">削除</button>
          </div>
        </div>
      `).join('');
    }
    container.innerHTML = html;
  }
}

// 現場マスタ：追加・編集モーダル
function getUniqueKantokuList() {
  const set = new Set();
  (masters.genbas || []).forEach(g => {
    const k = (g.kantoku || '').trim();
    if (k && k !== 'なし') set.add(k);
  });
  return Array.from(set).sort();
}
function onGenbaKantokuChange() {
  const val = document.getElementById('genba-input-kantoku-select').value;
  const free = document.getElementById('genba-input-kantoku-free');
  if (val === '__new__') {
    free.style.display = 'block';
    free.value = '';
    setTimeout(() => free.focus(), 50);
  } else {
    free.style.display = 'none';
    free.value = '';
  }
}
function openGenbaModal(rowIndex) {
  document.getElementById('genba-modal-title').textContent = rowIndex ? '現場を編集' : '現場を追加';
  document.getElementById('genba-edit-row').value = rowIndex || '';

  const sel = document.getElementById('genba-input-kantoku-select');
  const free = document.getElementById('genba-input-kantoku-free');
  free.style.display = 'none';
  free.value = '';
  sel.innerHTML = '';
  const optNone = document.createElement('option');
  optNone.value = ''; optNone.textContent = '（なし）';
  sel.appendChild(optNone);
  getUniqueKantokuList().forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    sel.appendChild(o);
  });
  const optNew = document.createElement('option');
  optNew.value = '__new__'; optNew.textContent = '＋ 新しい監督を入力';
  sel.appendChild(optNew);

  if (rowIndex) {
    const g = (masters.genbas || []).find(x => x.rowIndex === rowIndex);
    if (g) {
      document.getElementById('genba-input-name').value = g.name || '';
      const current = (g.kantoku || '').trim();
      const found = Array.from(sel.options).some(o => o.value === current);
      if (current && found) {
        sel.value = current;
      } else if (current) {
        sel.value = '__new__';
        free.style.display = 'block';
        free.value = current;
      } else {
        sel.value = '';
      }
    }
  } else {
    document.getElementById('genba-input-name').value = '';
    sel.value = '';
  }
  document.getElementById('genba-modal-bg').style.display = 'block';
}
function closeGenbaModal() {
  document.getElementById('genba-modal-bg').style.display = 'none';
}
async function saveGenba() {
  const rowIndex = document.getElementById('genba-edit-row').value;
  const name = document.getElementById('genba-input-name').value.trim();
  const selVal = document.getElementById('genba-input-kantoku-select').value;
  const kantoku = selVal === '__new__'
    ? document.getElementById('genba-input-kantoku-free').value.trim()
    : selVal;
  if (!name) { alert('現場名を入力してください'); return; }
  closeGenbaModal();
  showOverlay('保存中...');
  if (rowIndex) {
    await apiPost({ action: 'updateGenba', rowIndex: parseInt(rowIndex), name, kantoku, password: masterPassword });
  } else {
    await apiPost({ action: 'addGenba', name, kantoku, password: masterPassword });
  }
  await loadMasters();
}
async function deleteGenba(rowIndex, name) {
  if (!confirm('「' + name + '」を削除しますか？\n過去の登録履歴はそのまま残ります。')) return;
  showOverlay('削除中...');
  await apiPost({ action: 'deleteGenba', rowIndex, password: masterPassword });
  await loadMasters();
}

// 作業員マスタ：追加・編集モーダル
function openWorkerModal(rowIndex) {
  document.getElementById('worker-modal-title').textContent = rowIndex ? '作業員を編集' : '作業員を追加';
  document.getElementById('worker-edit-row').value = rowIndex || '';
  if (rowIndex) {
    const w = (masters.workers || []).find(x => x.rowIndex === rowIndex);
    if (w) document.getElementById('worker-input-name').value = w.name || '';
  } else {
    document.getElementById('worker-input-name').value = '';
  }
  document.getElementById('worker-modal-bg').style.display = 'block';
}
function closeWorkerModal() {
  document.getElementById('worker-modal-bg').style.display = 'none';
}
async function saveWorker() {
  const rowIndex = document.getElementById('worker-edit-row').value;
  const name = document.getElementById('worker-input-name').value.trim();
  if (!name) { alert('作業員名を入力してください'); return; }
  closeWorkerModal();
  showOverlay('保存中...');
  if (rowIndex) {
    await apiPost({ action: 'updateWorker', rowIndex: parseInt(rowIndex), name, password: masterPassword });
  } else {
    await apiPost({ action: 'addWorker', name, password: masterPassword });
  }
  await loadMasters();
}
async function deleteWorker(rowIndex, name) {
  if (!confirm('「' + name + '」を削除しますか？\n過去の登録履歴はそのまま残ります。')) return;
  showOverlay('削除中...');
  await apiPost({ action: 'deleteWorker', rowIndex, password: masterPassword });
  await loadMasters();
}

// ── 初期化 ──
loadList();
